name: React App CI/CD

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  test-and-build:
    name: Test and Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        id: install
        run: |
          if npm install; then
            echo "status=‚úÖ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=‚ĚĆ Failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Security Audit
        id: audit
        run: |
          if npm audit --audit-level=high; then
            echo "status=‚úÖ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=‚ö†ÔłŹ Vulnerabilities found" >> $GITHUB_OUTPUT
          fi

      - name: Run Linter
        id: lint
        run: |
          if npm run lint --if-present; then
            echo "status=‚úÖ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=‚ĚĆ Failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Run tests
        id: test
        run: |
          if npm run test:ci; then
            echo "status=‚úÖ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=‚ĚĆ Failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Build application
        id: build
        env:
          CI: false
        run: |
          if npm run build; then
            echo "status=‚úÖ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=‚ĚĆ Failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload build artifacts
        if: success() && matrix.node-version == '18.x'
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 7

      - name: Notify Discord
        if: ${{ !cancelled() && matrix.node-version == '18.x' }}
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            **React App CI/CD**
            **Repository** `${{ github.repository }}`
            **Branch** `${{ github.head_ref || github.ref_name }}`
            **Event** `${{ github.event_name }}`
            **Triggered by** `${{ github.actor }}`
            **Status** `${{ job.status }}`
            **Checks**
            Install: ${{ steps.install.outputs.status }}
            Audit: ${{ steps.audit.outputs.status }}
            Lint: ${{ steps.lint.outputs.status }}
            Test: ${{ steps.test.outputs.status }}
            Build: ${{ steps.build.outputs.status }}
            **Run** <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>
